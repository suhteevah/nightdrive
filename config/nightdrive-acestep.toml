# nightdrive runtime config for kokonoe — ACE-Step 1.5 engine variant.
# Diff from config/nightdrive.toml: [audio_gen] swapped to ace_step.
# Use via:  $env:NIGHTDRIVE_CONFIG = "config/nightdrive-acestep.toml"
# Or:       nightdrive-orchestrator --config config/nightdrive-acestep.toml run-batch ...

[paths]
work_dir = "J:/nightdrive/var/nightdrive"
sqlite_db = "J:/nightdrive/var/nightdrive/nightdrive.sqlite"
tracks_dir = "J:/nightdrive/var/nightdrive/tracks"

[openclaw]
base_url = "http://localhost:11434"
model = "qwen2.5:7b-instruct"
temperature = 0.85
max_tokens = 2048
timeout_seconds = 180

[audio_gen]
# ACE-Step 1.5 sidecar at sidecar/acestep_server.py (port 8083 since :8080
# is lattice-server, :8082 is the MG sidecar). MIT-licensed, single-shot
# full-song generation — no segment chain, no continuation prefix.
base_url = "http://127.0.0.1:8083"
engine = "ace_step"
model = "acestep-v15-turbo"
# ACE-Step emits 48 kHz stereo by default. The Rust client reads the WAV
# header so this is informational; ffmpeg downstream adapts.
sample_rate = 48000
channels = 2
# These are MG-specific; ACE-Step ignores them but we still need values
# for the struct to deserialize.
segment_seconds = 30
overlap_seconds = 0
continuation_prefix_seconds = 0.0
# ACE-Step's guidance_scale range is 1.0-15.0 (default 7.0). Different
# semantics from MG's cfg_coef (1.0-15.0 with default 3.0).
guidance_scale = 7.0
# 8 inference steps is the recommended turbo setting; 32-64 for the base
# variant. Higher = more quality at linear cost.
inference_steps = 8

[art]
base_url = "http://127.0.0.1:8081"
model = "sdxl"
width = 1024
height = 1024
steps = 20
cfg_scale = 7.0
negative_prompt = "text, watermark, signature, low quality, blurry, jpeg artifacts"

[mastering]
target_lufs = -14.0
true_peak_db = -1.0
loudness_range = 11.0
fade_in_seconds = 2.0
fade_out_seconds = 4.0

[visualizer]
width = 1920
height = 1080
fps = 30
quality_preset = "high"
seed_from_track_id = true
include_code_scroll = false

[encoder]
ffmpeg_path = "ffmpeg"
video_codec = "libx264"
crf = 18
preset = "medium"
audio_codec = "aac"
audio_bitrate = "320k"
intro_seconds = 3
outro_seconds = 3

[youtube]
default_privacy = "private"
default_category_id = "10"
schedule_offset_hours = 24
publish_window_start_hour = 19
publish_window_end_hour = 23
declare_synthetic_content = true

[livestream]
visualizer_ws_port = 7373
metadata_refresh_seconds = 1
shuffle_buffer_size = 12
min_replay_gap_hours = 24

[metrics]
prometheus_port = 9091
